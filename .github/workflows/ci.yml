name: CI

on:
  push:
    branches: [main]
    paths:
      - 'stripeflow/**'
  pull_request:
    branches: [main]
    paths:
      - 'stripeflow/**'

defaults:
  run:
    working-directory: stripeflow

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: stripeflow/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
