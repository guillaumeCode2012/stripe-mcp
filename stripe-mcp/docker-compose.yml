# docker-compose snippet — run stripe-mcp as a long-lived container.
#
# Most users will spawn stripe-mcp as a child process of their MCP client
# (Claude Desktop / Cursor / Windsurf) via the stdio transport. This compose
# file is for the rarer case of running it as a standalone container (e.g.
# behind an HTTP→stdio bridge, or for CI smoke tests).
#
# Usage:
#   STRIPE_SECRET_KEY=sk_test_... docker compose up --build
#   # or, to run a one-off command:
#   docker compose run --rm stripe-mcp --doctor

services:
  stripe-mcp:
    build: .
    image: stripe-mcp:1.0.0
    container_name: stripe-mcp
    stdin_open: true
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY must be set}
    restart: unless-stopped
